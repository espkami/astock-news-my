name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]  # 当代码推送到 main 分支时触发
  release:
    types: [published]    # 当发布新版本时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 注意：如果是多服务项目，需要指定具体的 Dockerfile 路径
          file: ./docker/Dockerfile 
          push: true
          # 替换为你的 dockerhub_username/repo_name
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/astock-news:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/astock-news:${{ github.sha }}