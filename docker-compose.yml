version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: astock_postgres
    environment:
      POSTGRES_DB: astock_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: astock_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── API 服务（含定时任务） ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: astock_api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/astock_news
      - REDIS_URL=redis://redis:6379/0
      - COLLECT_INTERVAL=${COLLECT_INTERVAL:-300}
      - BERT_CONFIDENCE_THRESHOLD=${BERT_CONFIDENCE_THRESHOLD:-0.90}
      - TOP_K_STOCKS=${TOP_K_STOCKS:-5}
      - ENABLE_CLS=${ENABLE_CLS:-true}
      - ENABLE_EASTMONEY=${ENABLE_EASTMONEY:-true}
      - ENABLE_SINA=${ENABLE_SINA:-true}
      - ENABLE_RSS=${ENABLE_RSS:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - faiss_data:/app/data/faiss_index
      - model_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── Nginx 反向代理（可选） ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: astock_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    profiles:
      - production   # 仅 production profile 启动

volumes:
  postgres_data:
  redis_data:
  faiss_data:
  model_cache:
